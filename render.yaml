services:
  - type: web
    name: quant-trading-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: TRADING212_BASE_URL
        value: https://live.trading212.com/api/v0
      - key: TRADING212_API_KEY
        sync: false
      - key: TRADING212_API_SECRET
        sync: false
      - key: FRONTEND_ORIGINS
        value: http://localhost:5173,https://quant-trading-dashboard.onrender.com

  - type: web
    name: quant-trading-dashboard
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://quant-trading-api.onrender.com

